        <input type="number" id="num1" placeholder="first number">
        <input type="number" id="num2" placeholder="second number">
        <input type="text"  id="operator" placeholder="operator(+,-,*,/)">
        <button id="btn"> Calculator</button>
        <h2 id="Result"></h2>
 <script>
    document.getElementById("btn").addEventListener("click",() =>{
        let number1 = Number(document.getElementById("num1").value);
        let number2 = Number(document.getElementById("num2").value);
        let op = document.getElementById("operator").value;
        let answer;
        if(op == "+"){
            answer=number1+number2;
        }
        else if(op=="-"){
            answer=number1-number2;
        }
        else if(op=="*"){
            answer=number1*number2;
        }
        else if(op=="/"){
            answer=number1/number2;
        }
        else{
            answer="Invalid operator";
        }
        document.getElementById("Result").innerText="Result:" +answer;
    });
    
 </script>
