<html>
    <head>
        <title></title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">       
        <style>
            *{
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
            }
            #parent{
                height: 60px;
                width: 100%;
                box-shadow: 0px 0.5px 10px lightgray;
                background-color: white;
                display: flex;
                justify-content: center;
                position: fixed;
                top: 0px;
                left: 0px;
                right: 0px  ;
                z-index: 1;
            }
            #child{
                background-color: white;
                width: 1050px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            #h2{
                display: flex;
                justify-content: space-around;
                margin-top: 80px;
                margin-bottom: 20px;
            }
            .parent1{
                width: 90%;
                margin: 0 auto;
            }
            #parent2{
                display: grid;
                grid-template-columns: repeat(auto-fit,minmax(250px,auto));
                gap: 1.5rem;
                /* width: 100%; */
            }
            img{
                width: 100%;
            }
            .hover:hover{
                padding: 10px;
                border: 1px solid black;
                transition: 0.4s;
            }
            
            .hover{
                position: relative;
            }
            
            .icon{
                position: absolute;
                bottom: 0px;
                right: 0px;
                color: white;
                background-color: black;
                padding: 5px;
            }

            .how{
                position: absolute;
                top: 0px;
                right: 100%;
                background-color:white;
                min-height: 550px;
                width: 320px;
                z-index: 4;
                /* display: none; */
                transition: 0.5s;
            }
            
            .icon2{
                color: black;
                font-size: 30px;
                display: flex;
                justify-content: end;
            }

            .ii{
                display: block;
                right: 0;
            }
            

            #heading{
                display: flex;
                justify-content: space-around;
                margin-bottom: 1.5rem;
            }
            #shirt{
                height: 150px;
                width: 100px;
                /* display: flex;
                justify-content: left; */
            }
            #siderparent{
                width: 90%;
                margin: 0 20;
            }
            
            .siderchild{
                /* height: 300px; */
                display: grid;
                grid-template-columns: 30% 50% 20%;
                gap: 1.5rem;
            
            }
            #trashicon{
                margin-top: 2.4rem;
            }
            .trash{
                color: red;
            }
            #h3{
                margin-top: 1rem;
            }
            #numbertype{
                margin-top: 1rem;
                height: 25px;
                width: 50px;
            }
            #line{
                width: 300px;
                margin-left: 10px;
                display: flex;
                justify-content: center;
            }
            #total{
                display: flex;
                justify-content: right;
            }
            #button{
                color: white;
                background-color:red;
                height: 30px;
                width: 90px;
                border: none;
                
            }
            #buttonbox{
                
            display: flex;
            justify-content: center;
            margin-top: 2rem;
            }
            /* .icon3{
                display: none;
            } */
        </style>
        
    </head>
    <body>
        <div id="parent">
            <div id="child">

                <P>Ecommerce</P>
                <i class="bi bi-bag bag" ></i>
            </div>

        </div>
        <h2 id="h2">Shop Products</h2>

        <div class="parent1">
            <div id="parent2">
            <!-- <div id="space"></div> -->
            <div class="hover">
                <img src="./shirt.jpeg" alt="shirt" class="image">
                <h3 class="head">Aeroready Shirt</h3>
                <span class="price">$25</span>
                <i class="bi bi-bag icon" ></i>
            </div>
            <div class="hover">
                <img src="./airpods.jpeg" alt="airpods" class="image">
                <h3 class="head">Airpods</h3>
                <span class="price">$25</span>
                <i class="bi bi-bag icon" ></i>
            </div>
            <div class="hover">
                <img src="./jacket.jpeg" alt="jacket" class="image">
                <h3 class="head">Jacket</h3>
                <span class="price">$25</span>
                <i class="bi bi-bag icon" ></i>
            </div>
            <div class="hover">
                <img src="./bottle.jpeg" alt="bottle" class="image">
                <h3 class="head">Bottle</h3>
                <span class="price">$25</span>
                <i class="bi bi-bag icon" ></i>
            </div>
            <div class="hover">
                <img src="./glasses.jpeg" alt="glasses" class="image">
                <h3 class="head">Glasses</h3>
                <span class="price">$25</span>
                <i class="bi bi-bag icon" ></i>
            </div>
            <div class="hover">
                <img src="./hat.jpeg" alt="hat" class="image">
                <h3 class="head">Hat</h3>
                <span class="price">$25</span>
                <i class="bi bi-bag icon" ></i>
            </div>
            <div class="hover">
                <img src="./bag.jpeg" alt="bag" class="image">
                <h3 class="head">Bag</h3>
                <span class="price">$25</span>
                <i class="bi bi-bag icon" ></i>
            </div>
            <div class="hover">
                <img src="./shoes.jpeg" alt="shoes" class="image">
                <h3 class="head">Shoes</h3>
                <span class="price">$25</span>
                <i class="bi bi-bag icon" ></i>
            </div>

        </div>
        </div>


        <div class="how">
            
            <i class="bi bi-x icon2"></i>
            <h2 id="heading">Your Cart</h2>

               <div id="siderparent">
                 <!-- <div id="siderchild">
                
                <div id="shirt"> <img src="./shirt.jpeg" alt="shirt"> </div>
                <div id="center">
                    <p>Aeroready shirt</p>
                    <h3 id="h3">$25</h3>
                    <input type="number" id="numbertype">
                </div>
                <div id="trashicon">
                    <i class="bi bi-trash3 trash"></i>
                </div>
                <hr id="line">
                <h3 id="total">Total $0</h3>

            </div> -->
               </div>
            
            <div id="buttonbox">
                    <button id="button">Buy Now</button>
                </div>
            
            
            
            
        </div>
        

        <script >
            var icon2 = document.querySelector(".icon2");
var how = document.querySelector(".how");
var bag = document.querySelector(".bag");
var icon = document.getElementsByClassName("icon");


bag.addEventListener("click", () => {
    how.classList.add("ii")
})
icon2.addEventListener("click", () => {
    how.classList.remove("ii")
})


// add to cart
for(var i=0; i<icon.length; i++)
{
    var btn = icon[i];
    btn.addEventListener("click", (e)=>{
        var button = e.target;
        var parent = button.parentElement;
       var firstimage = parent.getElementsByClassName("image")[0].src;
        console.log(firstimage);
        var head = parent.getElementsByClassName("head")[0].innerText;
        console.log(head);
        var price = parent.getElementsByClassName("price")[0].innerText;
        console.log(price);
        f1(firstimage,head,price)

    })
}

  var f1 = (firstimage,head,price)=>{
        var addition = document.createElement("div")
        addition.classList.add("siderchild")
        var c = `<div id="shirt"> <img src="${firstimage}" alt="shirt"> </div>
                <div id="center">
                    <p>${head}</p>
                    <h3 id="h3">${price}</h3>
                    <input type="number" id="numbertype">
                </div>
                <div id="trashicon">
                    <i class="bi bi-trash3 trash"></i>
                </div>`
                addition.innerHTML = c;
                var siderparent = document.getElementById("siderparent");

                siderparent.append(addition);
  }
        </script>
    </body>
</html>
