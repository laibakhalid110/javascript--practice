<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #9DB5B5;
              display: flex;
           justify-content: center;
           justify-content: center;
        }
        .box{
            height: 450px;
            width: 520px;
           border-radius: 10px;
           background-color: #9D8081;
           display: flex;
           justify-content: center;
           justify-content: center;
         margin-top: 8rem;
         box-shadow:  0px 8px 10px #776365;
           
        }
        .box-1{
            height: 420px;
            width: 300px;
            margin: 25px;
        
        }
        h1{
            font-size: 2rem;
            margin: 15px;
        }
        ul{
              list-style-type: none;
                margin: 35px 15px;
        }
        ul li{
              margin: 15px;
        }
        button{
              margin: 25px 85px;
              height: 30px;
              width: 100px;
              font-weight: bold; 
              background-color: #2F3B45;
              color: white;

        }
        #blank{
            margin: 20px;
            height: 40px;
            width: 250px;
            background-color:  #C6CFD1;
            color: black;
            box-shadow:  0px 8px 10px #776365;

        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box-1">
        <h1>Q1:What is the full form of HTML?</h1>
        <ul class="ul">
            <li>
                <input type="radio" name="same" value="Hello To My Land">
                <label for="">Hello To My Land</label>
            </li>
            <li>
                <input type="radio" name="same" value="Hey Text Markup Language">
                <label for="">Hey Text Markup Language</label>
            </li>
            <li>
                <input type="radio" name="same" value="HyperText Markup Language">
                <label for="">HyperText Markup Language</label>
            </li>
            <li>
                <input type="radio" name="same" value="Hypertext Markup Language">
                <label for="">Hypertext Markup Language</label>
            </li>

        </ul>
        <button id="btn">Submit</button>
        <div id="blank"></div>
        </div>
    </div>
    

    <script>
       document.getElementById("btn").addEventListener("click",()=>{
        let options = document.getElementsByName("same");
        let selectedAnswer ="";
        for(let i=0;i<options.length;i++){
            if(options[i].checked){
                selectedAnswer=options[i].value;
            }
        }
        document.getElementById("blank").innerText=selectedAnswer;
       });

    </script>
</body>
</html>
